<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Image/Video Uploader - 7IKITA</title>
    <link rel="icon" href="modd-4x.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f0f2e 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .uploader-container {
            width: 100%;
            max-width: 600px;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .uploader-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(-3px);
        }

        .uploader-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .uploader-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .upload-card {
            background: rgba(30, 30, 50, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: rgba(255, 255, 255, 0.24);
            background: rgba(255, 255, 255, 0.08);
        }

        .upload-area.dragover {
            border-color: rgba(255, 255, 255, 0.32);
            background: rgba(255, 255, 255, 0.12);
        }

        .upload-area i {
            font-size: 56px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 15px;
            display: block;
        }

        .upload-area.dragover i {
            color: rgba(26, 113, 255, 0.8);
        }

        .upload-area p {
            color: #fff;
            margin: 10px 0;
            font-size: 16px;
            font-weight: 500;
        }

        .upload-hint {
            color: rgba(255, 255, 255, 0.5) !important;
            font-size: 13px !important;
        }

        .upload-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            padding: 12px 28px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 20px;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.25);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.24);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        #fileInput {
            display: none;
        }

        #uploadProgress {
            display: none;
        }

        #uploadResult {
            display: none;
        }

        .entries-section {
            margin-top: 24px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .entries-section h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .entries-hint {
            color: rgba(255, 255, 255, 0.55);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .entries-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .entry-card {
            display: flex;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .entry-preview {
            width: 72px;
            min-width: 72px;
            height: 72px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .entry-preview img,
        .entry-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .entry-preview i {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.6);
        }

        .entry-content {
            flex: 1;
            min-width: 0;
        }

        .entry-content h4 {
            font-size: 14px;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .entry-content p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 8px;
        }

        .entry-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .entry-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(26, 113, 255, 0.18);
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(26, 113, 255, 0.3);
        }

        .entry-link:hover {
            background: rgba(26, 113, 255, 0.28);
        }

        .empty-state {
            color: rgba(255, 255, 255, 0.55);
            font-size: 13px;
            padding: 8px 0;
        }

        .preview-container {
            margin-top: 16px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .preview-media {
            display: block;
            width: 100%;
            max-height: 320px;
            object-fit: contain;
        }

        .progress-bar-upload {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, rgba(26, 113, 255, 0.6), rgba(26, 113, 255, 1));
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        #uploadStatus {
            display: none;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
        }

        #uploadResult h3 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 18px;
        }

        #uploadResult p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
            font-size: 14px;
        }

        .link-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        #shareLink {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            word-break: break-all;
            transition: all 0.3s ease;
        }

        #shareLink:focus {
            outline: none;
            border-color: rgba(26, 113, 255, 0.6);
            background: rgba(26, 113, 255, 0.05);
        }

        .copy-btn {
            background: rgba(26, 113, 255, 0.6);
            border: 1px solid rgba(26, 113, 255, 0.8);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: rgba(26, 113, 255, 0.8);
            transform: translateY(-2px);
        }

        .file-info {
            display: none !important;
            visibility: hidden;
            height: 0;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .file-info.show {
            display: none !important;
        }

        .preview-container {
            margin-top: 20px;
            display: block;
        }

        .preview-container img,
        .preview-container video {
            width: 100%;
            max-height: 320px;
            object-fit: contain;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
        }

        .file-info-item {
            font-size: 13px;
            margin: 8px 0;
            color: rgba(255, 255, 255, 0.7);
        }

        .file-info-label {
            color: rgba(255, 255, 255, 0.5);
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="uploader-container">
        <div class="uploader-header">
            <button type="button" class="back-btn" aria-label="Zurück"><i class="fas fa-arrow-left"></i></button>
            <h1><strong>Share Your Content</strong></h1>
            <p>Upload images or videos up to 100MB</p>
        </div>

        <div class="upload-card">
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-arrow-up"></i>
                <p>Drag & drop your image/video here</p>
                <p class="upload-hint">(max 100MB)</p>
                <input type="file" id="fileInput" accept="image/*,video/*">
                <button class="upload-btn" id="selectFileBtn">Select File</button>
            </div>

            <div id="uploadProgress">
                <div class="progress-bar-upload">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="uploadStatus">Uploading...</p>
            </div>

            <div id="uploadResult" style="display:none;"></div>

            <div class="entries-section">
                <h3>Deine Uploads</h3>
                <p class="entries-hint">Alle Dateien, die du erstellt hast, werden hier gelistet und bleiben über ihren Link erreichbar.</p>
                <div id="entriesList" class="entries-list"></div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const selectFileBtn = document.getElementById('selectFileBtn');
        const uploadProgress = document.getElementById('uploadProgress');
        const uploadResult = document.getElementById('uploadResult');
        const progressFill = document.getElementById('progressFill');
        const uploadStatus = document.getElementById('uploadStatus');
        const entriesList = document.getElementById('entriesList');
        const backBtn = document.querySelector('.back-btn');

        const STORAGE_KEY = 'imageUploaderEntries';
        const TTL_MS = 24 * 60 * 60 * 1000;
        const urlParams = new URLSearchParams(window.location.search);
        const requestedId = urlParams.get('id');

        function cleanupExpiredEntries() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return [];

                const entries = JSON.parse(raw);
                const now = Date.now();
                const activeEntries = entries.filter(entry => entry.expiresAt > now);

                if (activeEntries.length !== entries.length) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(activeEntries));
                }

                return activeEntries;
            } catch (error) {
                console.warn('Storage cleanup failed:', error);
                return [];
            }
        }

        function getStoredEntries() {
            return cleanupExpiredEntries();
        }

        function getEntryById(id) {
            const entries = getStoredEntries();
            return entries.find(entry => entry.id === id) || null;
        }

        function saveEntry(fileId, dataUrl, fileNameValue, fileType, fileSizeValue) {
            const entries = getStoredEntries();
            const entry = {
                id: fileId,
                dataUrl,
                fileName: fileNameValue,
                fileType,
                fileSize: fileSizeValue,
                createdAt: Date.now(),
                expiresAt: Date.now() + TTL_MS
            };

            entries.push(entry);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
            return entry;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function createShareUrl(fileId) {
            const currentUrl = new URL('view.html', window.location.href);
            currentUrl.searchParams.set('id', fileId);
            return currentUrl.toString();
        }

        function getMediaMarkup(entry) {
            const fileName = entry.fileName || 'Upload';
            if (entry.fileType && entry.fileType.startsWith('image/')) {
                return `<img class="preview-media" src="${entry.dataUrl}" alt="${escapeHtml(fileName)}">`;
            }

            if (entry.fileType && entry.fileType.startsWith('video/')) {
                return `<video class="preview-media" controls><source src="${entry.dataUrl}" type="${entry.fileType}"></video>`;
            }

            return `<div class="preview-media" style="display:flex;align-items:center;justify-content:center;padding:24px;color:rgba(255,255,255,0.65);"><i class="fas fa-file"></i></div>`;
        }

        function renderEntriesList(entries) {
            if (!entriesList) return;

            if (!entries.length) {
                entriesList.innerHTML = '<p class="empty-state">Noch keine Dateien gespeichert.</p>';
                return;
            }

            entriesList.innerHTML = entries.map(entry => `
                <div class="entry-card">
                    <div class="entry-preview">
                        ${entry.fileType && entry.fileType.startsWith('image/') ? `<img src="${entry.dataUrl}" alt="${escapeHtml(entry.fileName || 'Upload')}">` : entry.fileType && entry.fileType.startsWith('video/') ? `<video src="${entry.dataUrl}"></video>` : '<i class="fas fa-file"></i>'}
                    </div>
                    <div class="entry-content">
                        <h4>${escapeHtml(entry.fileName || 'Unbenannte Datei')}</h4>
                        <p>${formatFileSize(entry.fileSize || 0)} • ${new Date(entry.createdAt).toLocaleString('de-DE')}</p>
                        <div class="entry-actions">
                            <a class="entry-link" href="${createShareUrl(entry.id)}">Öffnen</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showEntry(entry) {
            uploadArea.style.display = 'none';
            uploadProgress.style.display = 'none';
            uploadResult.style.display = 'block';
            uploadStatus.style.display = 'none';
            uploadStatus.textContent = '';

            const shareUrl = createShareUrl(entry.id);
            uploadResult.innerHTML = `
                <h3>Upload erfolgreich</h3>
                <p>Dieser Link ist jetzt verfügbar:</p>
                <div class="link-container">
                    <input id="shareLink" value="${shareUrl}" readonly>
                    <button type="button" class="copy-btn" id="copyLinkBtn">Kopieren</button>
                </div>
                <div class="preview-container">
                    ${getMediaMarkup(entry)}
                </div>
                <p class="file-info-item"><span class="file-info-label">Datei:</span> ${escapeHtml(entry.fileName || 'Unbenannte Datei')}</p>
                <p class="file-info-item"><span class="file-info-label">Größe:</span> ${formatFileSize(entry.fileSize || 0)}</p>
            `;

            const copyLinkBtn = document.getElementById('copyLinkBtn');
            if (copyLinkBtn) {
                copyLinkBtn.addEventListener('click', async function() {
                    const shareLinkInput = document.getElementById('shareLink');
                    if (shareLinkInput) {
                        try {
                            await navigator.clipboard.writeText(shareLinkInput.value);
                            copyLinkBtn.textContent = 'Kopiert';
                            setTimeout(() => {
                                copyLinkBtn.textContent = 'Kopieren';
                            }, 1500);
                        } catch (error) {
                            shareLinkInput.select();
                            document.execCommand('copy');
                        }
                    }
                });
            }
        }

        function showExpiredState() {
            uploadArea.style.display = 'block';
            uploadProgress.style.display = 'none';
            uploadResult.style.display = 'block';
            uploadStatus.style.display = 'none';
            uploadStatus.textContent = '';
            uploadResult.innerHTML = '<p class="empty-state">Dieser Link ist abgelaufen oder nicht mehr verfügbar.</p>';
        }

        function refreshEntries() {
            renderEntriesList(getStoredEntries());
        }

        if (requestedId) {
            const entry = getEntryById(requestedId);
            if (entry) {
                showEntry(entry);
            } else {
                showExpiredState();
            }
        }

        refreshEntries();

        if (backBtn) {
            backBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'index.html';
            });
        }

        // File selection
        selectFileBtn.addEventListener('click', function() {
            fileInput.click();
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', function() {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', function() {
            if (fileInput.files.length > 0) {
                handleFile(fileInput.files[0]);
            }
        });

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function handleFile(file) {
            // Check file size (100MB = 104857600 bytes)
            if (file.size > 104857600) {
                alert('File size exceeds 100MB limit');
                return;
            }

            // Show progress
            uploadArea.style.display = 'none';
            uploadProgress.style.display = 'block';
            uploadStatus.style.display = 'block';
            uploadStatus.textContent = 'Uploading...';

            // Simulate upload progress
            let progress = 0;
            const interval = setInterval(function() {
                progress += Math.random() * 30;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
                uploadStatus.textContent = 'Uploading... ' + Math.floor(progress) + '%';
            }, 200);

            // Read file and create link
            const reader = new FileReader();
            reader.onload = function(e) {
                clearInterval(interval);
                progress = 100;
                progressFill.style.width = '100%';
                uploadStatus.textContent = 'Upload complete!';

                const fileId = 'file-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                const dataUrl = e.target.result;

                let entry;
                try {
                    entry = saveEntry(fileId, dataUrl, file.name, file.type, file.size);
                } catch (err) {
                    console.warn('Storage limit reached, using memory fallback:', err);
                    entry = {
                        id: fileId,
                        dataUrl,
                        fileName: file.name,
                        fileType: file.type,
                        fileSize: file.size,
                        createdAt: Date.now(),
                        expiresAt: Date.now() + TTL_MS
                    };
                }

                // Show result
                setTimeout(function() {
                    uploadProgress.style.display = 'none';
                    uploadArea.style.display = 'block';
                    uploadStatus.style.display = 'none';
                    uploadStatus.textContent = '';

                    showEntry(entry);
                    refreshEntries();
                }, 500);
            };

            reader.readAsDataURL(file);
        }

    </script>
</body>
</html>
