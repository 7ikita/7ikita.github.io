<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7IKITA </title>
    <link rel="icon" href="modd-4x.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Background Left Side -->
        <div class="background-left">
            <div class="moon-image"></div>
        </div>

        <!-- Main Content -->
        <div class="content-area">
            <!-- Profile Cards Container -->
            <div class="cards-container">
                <div class="profile-card moderator-card main-profile-card">
                    <div class="avatar-frame">
                        <img id="avatarImage" src="pfp.jpf.webp" alt="7IKITA Avatar">
                    </div>
                    <div class="card-content">
                        <h1 class="site-title">7IKITA</h1>
                        <h2 class="typewriter"><span id="typewriter"></span><span class="cursor">|</span></h2>
                        <div class="social-links profile-social-links">
                            <a role="button" tabindex="0"><i class="fab fa-twitch"></i></a>
                            <a role="button" tabindex="0" class="patreon-button"><img src="ml.webp" alt="Patreon"></a>
                            <a role="button" tabindex="0"><i class="fab fa-discord"></i></a>
                            <a role="button" tabindex="0"><img src="x-twitter-logo.webp" alt="X Logo"></a>
                            <a href="image-uploader.html" class="share-upload-button" role="button" tabindex="0"><i class="fas fa-share-nodes"></i></a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Info Section (audio player placed here) -->
            <div class="info-section">
                <div class="music-player">
                    <div class="player-cover">
                        <img id="albumCover" src="Image (2).jpg" alt="Albumcover">
                    </div>
                    <div class="player-info">
                        <h4>Bladi Labas - Qassem</h4>
                    </div>
                    <div class="player-controls">
                        <span class="time">0:00</span>
                        <div class="progress-bar">
                            <div class="progress"></div>
                        </div>
                        <span class="duration">0:19</span>
                        <button class="control-btn" id="prevBtn"><i class="fas fa-backward-step"></i></button>
                        <button class="control-btn play-btn" id="playBtn"><i class="fas fa-play"></i></button>
                        <button class="control-btn" id="nextBtn"><i class="fas fa-forward-step"></i></button>
                        <div class="player-volume">
                            <i class="fas fa-volume-up"></i>
                            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.2" aria-label="Lautstärke">
                        </div>
                        <audio id="audioPlayer" autoplay muted playsinline preload="auto">
                            <source src="./Bladi Labas.mp3" type="audio/mpeg">
                        </audio>
                    </div>
                </div>
            </div>
        </div>

        <!-- Background Right Side -->
        <div class="background-right">
            <div class="right-visual"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
